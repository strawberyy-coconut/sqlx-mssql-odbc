name: Publish to crates.io

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'   # e.g. v0.1.2, v0.1.2-alpha.1
  workflow_dispatch:                  # manual trigger via GitHub UI
    inputs:
      dry-run:
        description: 'Dry run (skip actual publish)'
        type: boolean
        default: true

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Extract tag version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          # Strip leading 'v' if present
          VER="${TAG#v}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VER"

      - name: Verify crate versions match tag
        run: |
          EXPECTED="${{ steps.version.outputs.version }}"
          mismatches=0
          for crate in sqlx-mssql-odbc-core sqlx-mssql-odbc-macros sqlx-mssql-odbc-cli .; do
            if [ "$crate" = "." ]; then
              dir="."
              name="sqlx-mssql-odbc"
            else
              dir="$crate"
              name="$crate"
            fi
            actual=$(cargo metadata --format-version=1 --no-deps \
              | jq -r ".packages[] | select(.name==\"$name\") | .version")
            if [ "$actual" != "$EXPECTED" ]; then
              echo "::error::$name version is $actual, expected $EXPECTED"
              mismatches=$((mismatches + 1))
            else
              echo "✓ $name == $actual"
            fi
          done
          if [ "$mismatches" -gt 0 ]; then
            echo "::error::$mismatches crate(s) have version mismatches with tag"
            exit 1
          fi

      - name: Publish sqlx-mssql-odbc-core
        run: |
          cd sqlx-mssql-odbc-core
          if [ "${{ inputs.dry-run || false }}" = "true" ]; then
            cargo publish --dry-run
          else
            cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
          fi

      - name: Publish sqlx-mssql-odbc-macros
        run: |
          cd sqlx-mssql-odbc-macros
          if [ "${{ inputs.dry-run || false }}" = "true" ]; then
            cargo publish --dry-run
          else
            cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
          fi

      - name: Publish sqlx-mssql-odbc-cli
        run: |
          cd sqlx-mssql-odbc-cli
          if [ "${{ inputs.dry-run || false }}" = "true" ]; then
            cargo publish --dry-run
          else
            cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
          fi

      - name: Publish sqlx-mssql-odbc (umbrella)
        run: |
          if [ "${{ inputs.dry-run || false }}" = "true" ]; then
            cargo publish --dry-run
          else
            cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
          fi
