name: Publish to crates.io

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'   # e.g. v0.1.2, v0.1.2-alpha.1
  workflow_dispatch:                  # manual trigger via GitHub UI
    inputs:
      dry-run:
        description: 'Dry run (skip actual publish)'
        type: boolean
        default: true

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (unixODBC)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y unixodbc-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Extract tag version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VER"

      - name: Verify crate versions match tag
        run: |
          EXPECTED="${{ steps.version.outputs.version }}"
          mismatches=0
          for crate in sqlx-mssql-odbc-core sqlx-mssql-odbc-macros sqlx-mssql-odbc-cli .; do
            if [ "$crate" = "." ]; then
              dir="."
              name="sqlx-mssql-odbc"
            else
              dir="$crate"
              name="$crate"
            fi
            actual=$(cargo metadata --format-version=1 --no-deps \
              | jq -r ".packages[] | select(.name==\"$name\") | .version")
            if [ "$actual" != "$EXPECTED" ]; then
              echo "::error::$name version is $actual, expected $EXPECTED"
              mismatches=$((mismatches + 1))
            else
              echo "✓ $name == $actual"
            fi
          done
          if [ "$mismatches" -gt 0 ]; then
            echo "::error::$mismatches crate(s) have version mismatches with tag"
            exit 1
          fi

      - name: Publish sqlx-mssql-odbc-core
        run: |
          CRATE="sqlx-mssql-odbc-core"
          cd sqlx-mssql-odbc-core
          if [ "${{ inputs.dry-run || false }}" = "true" ]; then
            cargo publish --dry-run
          else
            set +e
            OUTPUT=$(cargo publish 2>&1)
            EXIT=$?
            set -e
            if [ $EXIT -ne 0 ]; then
              if echo "$OUTPUT" | grep -q "already exists"; then
                echo "::notice::${CRATE}@${{ steps.version.outputs.version }} already on crates.io — skipping"
              else
                echo "$OUTPUT"
                exit 1
              fi
            fi
          fi

      - name: Wait for crates.io index propagation
        if: ${{ ! (inputs.dry-run || false) }}
        run: sleep 30

      - name: Publish sqlx-mssql-odbc-macros
        run: |
          CRATE="sqlx-mssql-odbc-macros"
          cd sqlx-mssql-odbc-macros
          if [ "${{ inputs.dry-run || false }}" = "true" ]; then
            cargo publish --dry-run
          else
            set +e
            OUTPUT=$(cargo publish 2>&1)
            EXIT=$?
            set -e
            if [ $EXIT -ne 0 ]; then
              if echo "$OUTPUT" | grep -q "already exists"; then
                echo "::notice::${CRATE}@${{ steps.version.outputs.version }} already on crates.io — skipping"
              else
                echo "$OUTPUT"
                exit 1
              fi
            fi
          fi

      - name: Wait for crates.io index propagation
        if: ${{ ! (inputs.dry-run || false) }}
        run: sleep 30

      - name: Publish sqlx-mssql-odbc-cli
        run: |
          CRATE="sqlx-mssql-odbc-cli"
          cd sqlx-mssql-odbc-cli
          if [ "${{ inputs.dry-run || false }}" = "true" ]; then
            cargo publish --dry-run
          else
            set +e
            OUTPUT=$(cargo publish 2>&1)
            EXIT=$?
            set -e
            if [ $EXIT -ne 0 ]; then
              if echo "$OUTPUT" | grep -q "already exists"; then
                echo "::notice::${CRATE}@${{ steps.version.outputs.version }} already on crates.io — skipping"
              else
                echo "$OUTPUT"
                exit 1
              fi
            fi
          fi

      - name: Wait for crates.io index propagation
        if: ${{ ! (inputs.dry-run || false) }}
        run: sleep 30

      - name: Publish sqlx-mssql-odbc (umbrella)
        run: |
          CRATE="sqlx-mssql-odbc"
          if [ "${{ inputs.dry-run || false }}" = "true" ]; then
            cargo publish --dry-run
          else
            set +e
            OUTPUT=$(cargo publish 2>&1)
            EXIT=$?
            set -e
            if [ $EXIT -ne 0 ]; then
              if echo "$OUTPUT" | grep -q "already exists"; then
                echo "::notice::${CRATE}@${{ steps.version.outputs.version }} already on crates.io — skipping"
              else
                echo "$OUTPUT"
                exit 1
              fi
            fi
          fi
