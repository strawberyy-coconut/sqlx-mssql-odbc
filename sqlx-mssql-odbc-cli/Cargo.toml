[package]
name = "sqlx-mssql-odbc-cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "sqlx-mssql"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
console = "0.15"
sqlx = { version = "0.9.0", default-features = false, features = ["any", "runtime-tokio", "migrate"] }
sqlx-cli = "0.9.0"
sqlx-mssql-odbc-core = { version = "0.0.1", path = "../sqlx-mssql-odbc-core", features = ["any", "migrate"] }
tokio = { version = "1.25.0", features = ["rt-multi-thread", "macros"] }
